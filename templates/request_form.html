<!-- Request form-->

{% extends "base.html" %}
{% block content %}

<div class = "form-container">
    <h2>Request an Inspection</h2>
    <form method = "POST" action = "/request/new">
        <div class = "form-group">
            <label>Property Address</label>
            <input type = "text" 
                   name = "address" 
                   placeholder = "123 Main St, Houston TX"
                   required>
        </div>
        <div class = "form-group">
            <label>Description of Issue</label>
            <textarea name = "description" 
                      placeholder = "Describe the issue with your roof..."
                      required></textarea>
        </div>

        <div class = "form-group">
            <label>Preferred contact time</label>
            <select name = "contactTime" required>
                <option value = "">Select a time</option>
                <option value = "Morning">Morning (8am - 12pm)</option>
                <option value = "Afternoon">Afternoon (12pm - 4pm)</option>
                <option value = "Evening">Evening (4pm - 8pm)</option>
                <option value = "Any">Anytime</option>
            </select>
        </div>

        <div class = "form-group">
            <input type = "checkbox" name = "isEmergency" id = "emergency">
            <label for = "emergency">
                🚨 Mark as Emergency
            </label>
        </div>

        <button type = "submit" class = "btn">Submit Request</button>
        <a href = "/customer/dashboard"
            style = "margin-left: 16px; font-size: 14px;">Cancel</a>
    </form>
</div>

{% endblock %}
